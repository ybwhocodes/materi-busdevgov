<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard Materi — BusDev & Governance</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Sora', sans-serif;
    background: #0b0f1a;
    color: #e8e4da;
    min-height: 100vh;
    margin: 0;
  }

  /* Grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .content { position: relative; z-index: 1; }

  /* Hero accent */
  .hero-accent {
    background: linear-gradient(135deg, #1a2540 0%, #0f1623 100%);
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }

  .tag-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 100px;
  }

  .tag-busdev { background: rgba(56, 182, 255, 0.12); color: #38b6ff; border: 1px solid rgba(56, 182, 255, 0.25); }
  .tag-gov    { background: rgba(167, 139, 250, 0.12); color: #a78bfa; border: 1px solid rgba(167, 139, 250, 0.25); }
  .tag-both   { background: rgba(52, 211, 153, 0.12); color: #34d399; border: 1px solid rgba(52, 211, 153, 0.25); }

  .mat-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    padding: 1.25rem 1.5rem;
    transition: all 0.2s ease;
    text-decoration: none;
    display: block;
    color: inherit;
  }
  .mat-card:hover {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.15);
    transform: translateY(-3px);
  }
  .mat-card.locked { cursor: default; opacity: 0.55; }
  .mat-card.locked:hover { transform: none; background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.07); }

  .mat-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.25);
  }

  .mat-title {
    font-size: 15px;
    font-weight: 600;
    color: #f0ece0;
    margin: 0.4rem 0 0.3rem;
  }

  .mat-desc {
    font-size: 13px;
    color: rgba(232, 228, 218, 0.55);
    line-height: 1.6;
    margin: 0;
  }

  .divider {
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin: 0.85rem 0;
  }

  .stat-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 1rem 1.25rem;
  }

  .filter-btn {
    font-size: 12px;
    font-weight: 500;
    padding: 5px 14px;
    border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.12);
    background: transparent;
    color: rgba(232,228,218,0.55);
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Sora', sans-serif;
  }
  .filter-btn:hover { border-color: rgba(255,255,255,0.25); color: #e8e4da; }
  .filter-btn.active { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); color: #f0ece0; }

  .search-input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 10px 14px 10px 38px;
    font-size: 14px;
    color: #e8e4da;
    outline: none;
    font-family: 'Sora', sans-serif;
    transition: border-color 0.15s;
  }
  .search-input::placeholder { color: rgba(232,228,218,0.3); }
  .search-input:focus { border-color: rgba(255,255,255,0.25); }

  .arrow-icon { font-size: 13px; opacity: 0.4; }
  .arrow-live { color: #38b6ff; opacity: 1; }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(232,228,218,0.3);
    margin-bottom: 0.75rem;
  }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: rgba(232,228,218,0.3);
    font-size: 14px;
    grid-column: 1 / -1;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .mat-card { animation: fadeUp 0.3s ease both; }
</style>
</head>
<body>

<div class="content">

  <!-- HERO -->
  <div class="hero-accent">
    <div style="max-width: 1100px; margin: 0 auto; padding: 3rem 2rem 2.5rem;">
      <div style="display:flex; align-items:center; gap:8px; margin-bottom: 1.25rem;">
        <span style="width:8px;height:8px;border-radius:50%;background:#34d399;display:inline-block;box-shadow:0 0 0 3px rgba(52,211,153,0.2);"></span>
        <span style="font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(232,228,218,0.4);">Tim Internal &bull; Akses Terbuka</span>
      </div>

      <h1 style="font-size: clamp(1.75rem, 4vw, 2.75rem); font-weight: 700; line-height: 1.15; margin: 0 0 0.75rem; color: #f0ece0; max-width: 640px;">
        Pusat Materi<br/>BusDev &amp; Governance
      </h1>
      <p style="font-size: 15px; color: rgba(232,228,218,0.5); max-width: 540px; line-height: 1.7; margin: 0 0 2rem;">
        Kumpulan modul pembelajaran untuk mendukung pertumbuhan kapabilitas individu dalam bidang <strong style="color: #38b6ff; font-weight:500;">business development</strong> dan <strong style="color: #a78bfa; font-weight:500;">tata kelola organisasi</strong>.
      </p>

      <!-- Stats -->
      <div style="display:grid; grid-template-columns: repeat(3, minmax(0, 180px)); gap: 12px;">
        <div class="stat-card">
          <div style="font-size:26px;font-weight:700;color:#f0ece0;" id="stat-total">8</div>
          <div style="font-size:12px;color:rgba(232,228,218,0.4);margin-top:2px;">Total materi</div>
        </div>
        <div class="stat-card">
          <div style="font-size:26px;font-weight:700;color:#f0ece0;">2</div>
          <div style="font-size:12px;color:rgba(232,228,218,0.4);margin-top:2px;">Kategori</div>
        </div>
        <div class="stat-card">
          <div style="font-size:26px;font-weight:700;color:#34d399;">Gratis</div>
          <div style="font-size:12px;color:rgba(232,228,218,0.4);margin-top:2px;">Akses penuh</div>
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div style="max-width: 1100px; margin: 0 auto; padding: 2rem 2rem 4rem;">

    <!-- Search & Filter -->
    <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-bottom: 1.5rem;">
      <div style="position:relative; flex:1; min-width:200px; max-width:360px;">
        <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;opacity:0.3;">&#128269;</span>
        <input class="search-input" id="search" type="text" placeholder="Cari materi..." oninput="renderCards()" />
      </div>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="filter-btn active" onclick="setFilter('all',this)">Semua</button>
        <button class="filter-btn" onclick="setFilter('busdev',this)">Business Dev</button>
        <button class="filter-btn" onclick="setFilter('gov',this)">Governance</button>
        <button class="filter-btn" onclick="setFilter('both',this)">Keduanya</button>
      </div>
    </div>

    <!-- Cards -->
    <div id="card-grid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px;"></div>

  </div>
</div>

<script>
const materi = [
  {
    id:1, num:"01", title:"Kaizen & Horenso",
    desc:"Prinsip perbaikan berkelanjutan dan metode komunikasi efektif ala Jepang untuk tim yang solid.",
    cat:"both", url:"https://ybwhocodes.github.io/materi-busdevgov/1-materi-Kaizen-Horenso.html"
  },
  {
    id:2, num:"02", title:"Businness Process Improvement",
    desc:"Metodologi untuk menganalisis dan meningkatkan proses bisnis guna efisiensi dan nilai tambah.",
    cat:"busdev", url:"https://ybwhocodes.github.io/materi-busdevgov/2-materi-Business-Process-Improvement.html"
  },
  {
    id:3, num:"03", title:"Good Corporate Governance",
    desc:"Prinsip-prinsip tata kelola perusahaan yang baik: transparansi, akuntabilitas, dan integritas.",
    cat:"gov", url:null
  },
  {
    id:4, num:"04", title:"Negosiasi & Persuasi",
    desc:"Teknik negosiasi berbasis data dan komunikasi persuasif untuk closing yang lebih efektif.",
    cat:"busdev", url:null
  },
  {
    id:5, num:"05", title:"Risk Management",
    desc:"Identifikasi, penilaian, dan mitigasi risiko dalam konteks bisnis dan operasional organisasi.",
    cat:"gov", url:null
  },
  {
    id:6, num:"06", title:"Strategi Kemitraan",
    desc:"Membangun dan memelihara hubungan strategis dengan mitra bisnis untuk pertumbuhan jangka panjang.",
    cat:"busdev", url:null
  },
  {
    id:7, num:"07", title:"Compliance & Etika Bisnis",
    desc:"Kepatuhan regulasi dan standar etika dalam pengambilan keputusan bisnis sehari-hari.",
    cat:"gov", url:null
  },
  {
    id:8, num:"08", title:"Presentasi & Storytelling",
    desc:"Menyampaikan proposal dan ide bisnis secara menarik kepada klien dan pemangku kepentingan.",
    cat:"both", url:null
  }
];

const badgeMap = {
  busdev: '<span class="tag-pill tag-busdev">Business Dev</span>',
  gov:    '<span class="tag-pill tag-gov">Governance</span>',
  both:   '<span class="tag-pill tag-both">BusDev &amp; Gov</span>'
};

let activeFilter = 'all';

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function renderCards() {
  const q = document.getElementById('search').value.toLowerCase();
  const grid = document.getElementById('card-grid');
  const filtered = materi.filter(m => {
    const matchCat = activeFilter === 'all' || m.cat === activeFilter;
    const matchQ = m.title.toLowerCase().includes(q) || m.desc.toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">Tidak ada materi yang sesuai pencarian.</div>';
    return;
  }

  grid.innerHTML = filtered.map((m, i) => {
    const isLive = !!m.url;
    const tag = isLive
      ? `<span class="arrow-icon arrow-live">&#8599; Buka materi</span>`
      : `<span class="arrow-icon">&#128274; Segera hadir</span>`;

    return `<a
      href="${isLive ? m.url : '#'}"
      ${isLive ? 'target="_blank" rel="noopener"' : 'onclick="return false"'}
      class="mat-card${isLive ? '' : ' locked'}"
      style="animation-delay:${i * 0.04}s"
    >
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        ${badgeMap[m.cat]}
        <span class="mat-num">${m.num}</span>
      </div>
      <p class="mat-title">${m.title}</p>
      <p class="mat-desc">${m.desc}</p>
      <div class="divider"></div>
      <div style="display:flex;justify-content:flex-end;">
        ${tag}
      </div>
    </a>`;
  }).join('');
}

renderCards();
</script>
</body>
</html>
